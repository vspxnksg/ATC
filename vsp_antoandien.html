<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>An toàn Điện VSP — Tra cứu đáp án</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f0883e;--card:#1c2128;--hover:#21262d;--radius:8px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"IBM Plex Sans",sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:flex-start;gap:12px;position:sticky;top:0;z-index:100}
  .logo{font-size:16px;font-weight:700;color:var(--accent);white-space:nowrap;padding-top:8px;line-height:1.3}
  .logo span{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:2px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px;max-width:700px}
  .sw textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:"IBM Plex Sans",sans-serif;font-size:14px;padding:10px 14px;resize:none;outline:none;line-height:1.5;min-height:44px;max-height:150px;transition:border-color .2s}
  .sw textarea:focus{border-color:var(--accent)}
  .sw textarea::placeholder{color:var(--muted)}
  .sw-row{display:flex;gap:8px;align-items:center}
  .btn-search{background:var(--accent);color:#0d1117;border:none;border-radius:6px;padding:7px 18px;font-family:"IBM Plex Sans",sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;white-space:nowrap}
  .btn-search:hover{opacity:.85}
  .btn-clear{background:none;border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--muted);font-size:13px;cursor:pointer}
  .btn-clear:hover{color:var(--text);border-color:var(--muted)}
  .stats{color:var(--muted);font-size:12px;margin-left:auto;padding-top:8px;white-space:nowrap}
  main{max-width:900px;margin:20px auto;padding:0 14px 60px}
  .hint-box{text-align:center;padding:50px 20px;color:var(--muted)}
  .hint-box .ic{font-size:44px;margin-bottom:10px}
  .hint-box h2{font-size:17px;color:var(--text);margin-bottom:8px}
  .hint-box p{font-size:13px;line-height:1.8}
  .rc{font-size:13px;color:var(--muted);margin-bottom:10px;padding:0 2px;display:none}
  .rc strong{color:var(--accent)}
  .cards{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:grid;grid-template-columns:36px 1fr 50px;gap:12px;align-items:start;transition:border-color .15s,background .15s}
  .card:hover{border-color:rgba(240,136,62,.35);background:var(--hover)}
  .num{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);padding-top:2px}
  .qblock{}
  .qtext{font-size:13.5px;line-height:1.65;color:var(--text)}
  .qhint{font-size:12px;line-height:1.6;color:var(--muted);margin-top:8px;padding:8px 10px;background:#ffffff08;border-left:3px solid var(--border);border-radius:0 4px 4px 0}
  .qhint .hlabel{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .ans{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:6px;font-family:"IBM Plex Mono",monospace;font-size:22px;font-weight:700;flex-shrink:0}
  .A{background:#1f3a2c;color:#3fb950;border:1.5px solid rgba(63,185,80,.3)}
  .B{background:#1a2d4a;color:#58a6ff;border:1.5px solid rgba(88,166,255,.3)}
  .C{background:#3d2a1a;color:#f0883e;border:1.5px solid rgba(240,136,62,.3)}
  .D{background:#3a1a2c;color:#bc8cff;border:1.5px solid rgba(188,140,255,.3)}
  .nr{text-align:center;padding:48px 20px;color:var(--muted);display:none}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:10px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<header>
  <div class="logo">&#9889; An toàn Điện<span>VSP · Tra cứu đáp án</span></div>
  <div class="sw">
    <textarea id="box" placeholder="Paste câu hỏi vào đây..." rows="2"></textarea>
    <div class="sw-row">
      <button class="btn-search" id="btnSearch">&#128269; Tìm kiếm</button>
      <button class="btn-clear" id="btnClear">Xoá</button>
      <span class="stats" id="stats">43 câu</span>
    </div>
  </div>
</header>
<main>
  <div class="hint-box" id="hintBox">
    <div class="ic">&#9889;</div>
    <h2>Tra cứu đáp án — An toàn Điện VSP</h2>
    <p>Copy câu hỏi từ trang thi &rarr; Paste vào ô trên &rarr; Nhấn <strong style="color:var(--accent)">Tìm kiếm</strong> hoặc <strong style="color:var(--accent)">Enter</strong><br><br>
    Đáp án&nbsp;
    <strong style="color:#3fb950">A</strong> &nbsp;
    <strong style="color:#58a6ff">B</strong> &nbsp;
    <strong style="color:#f0883e">C</strong> &nbsp;
    <strong style="color:#bc8cff">D</strong></p>
  </div>
  <div class="rc" id="rc"></div>
  <div class="cards" id="cards"></div>
  <div class="nr" id="nr">
    <div style="font-size:32px;margin-bottom:8px">&#128565;</div>
    <p>Không tìm thấy câu khớp.<br>Thử rút ngắn hoặc dùng vài từ khoá chính.</p>
  </div>
</main>
<footer>Vietsovpetro &middot; Xưởng MWD &middot; 43 câu hỏi An toàn Điện</footer>

function tok(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,' ')
    .split(' ').filter(function(w){return w.length>1});
}

var IDX={};
DATA.forEach(function(item,i){
  var ws=tok(item.question+' '+item.keyword+' '+(item.hint||''));
  var seen={};
  ws.forEach(function(w){
    if(!seen[w]){
      if(!IDX[w])IDX[w]=[];
      IDX[w].push(i);
      seen[w]=1;
    }
  });
});
var KEYS=Object.keys(IDX);

function doSearch(q){
  var qw=tok(q);
  if(!qw.length)return[];
  var sc={};
  qw.forEach(function(w){
    (IDX[w]||[]).forEach(function(i){sc[i]=(sc[i]||0)+3});
    KEYS.forEach(function(k){
      if(k!==w&&k.indexOf(w)===0)(IDX[k]||[]).forEach(function(i){sc[i]=(sc[i]||0)+1});
    });
  });
  return Object.keys(sc).map(function(i){return[+i,sc[i]]})
    .sort(function(a,b){return b[1]-a[1]})
    .slice(0,10).map(function(x){return DATA[x[0]]});
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var box=document.getElementById('box');
var btnSearch=document.getElementById('btnSearch');
var btnClear=document.getElementById('btnClear');
var statsEl=document.getElementById('stats');
var hintBox=document.getElementById('hintBox');
var rcEl=document.getElementById('rc');
var cardsEl=document.getElementById('cards');
var nrEl=document.getElementById('nr');

function reset(){
  cardsEl.innerHTML='';
  hintBox.style.display='block';
  rcEl.style.display='none';
  nrEl.style.display='none';
  statsEl.textContent='43 câu';
}

function render(results){
  hintBox.style.display='none';
  if(!results.length){
    cardsEl.innerHTML='';
    rcEl.style.display='none';
    nrEl.style.display='block';
    return;
  }
  nrEl.style.display='none';
  rcEl.style.display='block';
  rcEl.innerHTML='Tìm thấy <strong>'+results.length+'</strong> câu khớp';
  cardsEl.innerHTML=results.map(function(item){
    var hintHtml='';
    if(item.hint&&item.hint.trim()){
      hintHtml='<div class="qhint"><div class="hlabel">Gợi ý đáp án</div>'+escHtml(item.hint)+'</div>';
    }
    return '<div class="card">'
      +'<div class="num">#'+item.stt+'</div>'
      +'<div class="qblock">'
        +'<div class="qtext">'+escHtml(item.question)+'</div>'
        +hintHtml
      +'</div>'
      +'<div class="ans '+item.answer+'">'+item.answer+'</div>'
      +'</div>';
  }).join('');
}

function runSearch(){
  var q=box.value;
  if(!q.trim()){reset();return;}
  var r=doSearch(q);
  statsEl.textContent=r.length+' kết quả';
  render(r);
}

btnSearch.addEventListener('click',runSearch);
box.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();runSearch();}
});
var tmr;
box.addEventListener('input',function(){
  clearTimeout(tmr);tmr=setTimeout(runSearch,500);
});
box.addEventListener('paste',function(){
  setTimeout(runSearch,100);
});
btnClear.addEventListener('click',function(){
  box.value='';reset();box.focus();
});
</script>
